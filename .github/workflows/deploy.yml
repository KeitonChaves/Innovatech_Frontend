name: CI/CD — Build, Push & Deploy Frontend

# ✔ Se activa solo con push a la rama 'deploy'
on:
  push:
    branches:
      - deploy

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Build y Push imagen Frontend
  # ─────────────────────────────────────────────
  build:
    name: Build & Push — Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          dockerfile: ./front_despacho/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

  # ─────────────────────────────────────────────
  # JOB 2: Deploy en EC2 pública (espera el build)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy en EC2 pública
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy via SSH a EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Innovatech_Frontend

            git remote set-url origin https://github.com/MatiDroid21/Innovatech_Frontend.git

            git pull origin deploy

            cat > .env <<EOF
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            EOF

            docker compose pull
            docker compose up -d --remove-orphans

            docker image prune -f