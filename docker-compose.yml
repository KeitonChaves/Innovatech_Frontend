# docker-compose.yml — Innovatech Frontend
# Levanta el frontend React/Vite en Nginx (puerto 80)
# Uso: docker compose up -d
# NOTA: En producción se usa la imagen pre-construida de Docker Hub.
#       Las variables VITE_* se embeben en build time dentro del CI/CD,
#       NO se pasan como environment en runtime.

services:

  # ─── FRONTEND ────────────────────────────────────────────────
  frontend:
    image: ${DOCKER_USERNAME}/innovatech-frontend:latest
    container_name: innovatech_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - frontend_net

# ─── REDES ───────────────────────────────────────────────────
networks:
  frontend_net:
    name: innovatech_frontend_net
    driver: bridge
