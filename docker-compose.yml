# docker-compose.yml — Innovatech Frontend
# Levanta el frontend React/Vite en Nginx (puerto 80)
# Uso: docker compose up --build

services:

  # ─── FRONTEND ────────────────────────────────────────────────
  frontend:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: innovatech_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    networks:
      - frontend_net

# ─── REDES ───────────────────────────────────────────────────
networks:
  frontend_net:
    name: innovatech_frontend_net
    driver: bridge
